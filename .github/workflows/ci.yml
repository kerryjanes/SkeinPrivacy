name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: 3.1.10
  ANCHOR_VERSION: 1.0.2

jobs:
  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: cargo fmt --all --check

  programs:
    name: Solana programs (Anchor + LiteSVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Solana (Agave) ${{ env.SOLANA_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      # avm + anchor-cli are host tools; build them with a recent stable (some of their deps,
      # e.g. cargo-platform, now require rustc > 1.91) while the programs + host-crate tests
      # below stay on the repo-pinned 1.89 toolchain. RUSTUP_TOOLCHAIN overrides the pin.
      - name: Install Anchor ${{ env.ANCHOR_VERSION }} via avm
        env:
          RUSTUP_TOOLCHAIN: stable
        run: |
          rustup toolchain install stable --profile minimal
          cargo install --git https://github.com/solana-foundation/anchor avm --locked --force
          avm install ${ANCHOR_VERSION}
          avm use ${ANCHOR_VERSION}
      - uses: Swatinem/rust-cache@v2
      # The deploy keypairs (target/deploy/*-keypair.json) are gitignored, so a fresh CI
      # checkout has none. `anchor keys sync` generates them and rewrites declare_id!/Anchor.toml
      # to match, avoiding the program-id-mismatch check. Ephemeral (CI only) — the committed
      # on-chain ids are unchanged in the repo; tests only need the ids to be self-consistent.
      - name: Sync program keys
        run: anchor keys sync
      # Build the program .so files first so the LiteSVM test binaries can `include_bytes!`
      # sibling programs. `--no-idl`: the IDL phase recompiles each program's test target,
      # which include_bytes! a sibling .so that isn't built yet at that point (cross-program
      # ordering) — and the committed SDK already carries the IDLs, so regenerating is moot.
      - name: Anchor build
        run: anchor build --no-idl
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests (programs + host crates, LiteSVM)
        run: cargo test --workspace

  # Per-device build of the VPN/networking crates (pure host-target Rust, no Solana toolchain).
  # Desktop OSes run clippy + the host-crate tests; mobile targets cross-build the client core
  # (what a native iOS/Android app embeds — tests can't run on-device in CI). End users already
  # connect from phones via V2Box / Happ (stock VLESS); this keeps the core building everywhere.
  platform:
    name: Platform · ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: Linux (x86_64), os: ubuntu-latest }
          - { label: macOS (arm64), os: macos-latest }
          - { label: Windows (x86_64), os: windows-latest }
          - { label: Android (arm64), os: ubuntu-latest, target: aarch64-linux-android }
          - { label: iOS (arm64), os: macos-latest, target: aarch64-apple-ios }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - name: Add Rust target
        if: matrix.target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Set up Android NDK
        if: matrix.target == 'aarch64-linux-android'
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
      - name: Configure Android linker
        if: matrix.target == 'aarch64-linux-android'
        run: |
          TC="${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          {
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TC/aarch64-linux-android24-clang"
            echo "CC_aarch64_linux_android=$TC/aarch64-linux-android24-clang"
            echo "AR_aarch64_linux_android=$TC/llvm-ar"
          } >> "$GITHUB_ENV"
      # Desktop (no cross target): lint + run the host-crate tests. `shell: bash` so both
      # commands gate the job on every OS (Windows pwsh only checks the last line's exit code).
      - name: Clippy + test (desktop)
        if: ${{ !matrix.target }}
        shell: bash
        run: |
          cargo clippy -p weft-vpn -p weft-net -p weft-node -p weft-primitives --all-targets -- -D warnings
          cargo test -p weft-vpn -p weft-net -p weft-node -p weft-primitives
      # Mobile: cross-build the client core for the device target.
      - name: Build client core (mobile)
        if: matrix.target
        run: cargo build -p weft-vpn -p weft-net --target ${{ matrix.target }}

  typescript:
    name: TypeScript (SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm build

  security:
    name: Dependency audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cargo-deny checks advisories (RUSTSEC), license policy, banned crates, and
      # source registries against `deny.toml` (M8 audit hardening).
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
