name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: 3.1.10
  ANCHOR_VERSION: 1.0.2

jobs:
  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: cargo fmt --all --check

  build-test:
    name: Build & test (Anchor + LiteSVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Solana (Agave) ${{ env.SOLANA_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install Anchor ${{ env.ANCHOR_VERSION }} via avm
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked --force
          avm install ${ANCHOR_VERSION}
          avm use ${ANCHOR_VERSION}
      - uses: Swatinem/rust-cache@v2
      # Build first so program test binaries can `include_bytes!` the .so.
      - name: Anchor build
        run: anchor build
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests (host crates + LiteSVM program tests)
        run: cargo test --workspace

  typescript:
    name: TypeScript (SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm build

  security:
    name: Dependency audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cargo-deny checks advisories (RUSTSEC), license policy, banned crates, and
      # source registries against `deny.toml` (M8 audit hardening).
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
