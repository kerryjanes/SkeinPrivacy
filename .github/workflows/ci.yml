name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: 3.1.10
  ANCHOR_VERSION: 1.0.2

jobs:
  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: cargo fmt --all --check

  build-test:
    name: Build & test (Anchor + LiteSVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Solana (Agave) ${{ env.SOLANA_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install Anchor ${{ env.ANCHOR_VERSION }} via avm
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked --force
          avm install ${ANCHOR_VERSION}
          avm use ${ANCHOR_VERSION}
      - uses: Swatinem/rust-cache@v2
      # Build first so program test binaries can `include_bytes!` the .so.
      - name: Anchor build
        run: anchor build
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests (host crates + LiteSVM program tests)
        run: cargo test --workspace

  # The VPN/networking crates are pure host-target Rust (no Solana/Anchor toolchain) and must
  # build + pass tests on every desktop OS. Linux is covered by `build-test`; this proves
  # Windows and macOS for the "connect to a node" + "run a node" crates.
  cross-platform:
    name: Host crates — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (host crates)
        run: cargo clippy -p weft-vpn -p weft-net -p weft-node -p weft-primitives --all-targets -- -D warnings
      - name: Test (host crates)
        run: cargo test -p weft-vpn -p weft-net -p weft-node -p weft-primitives

  # Prove the client engine (what a native iOS/Android app would embed) compiles for mobile.
  # End users connect from phones today via V2Box / Happ (stock VLESS clients on both stores);
  # this guards the future embedded-core path so the Rust never drifts off-mobile.
  mobile-core:
    name: Mobile core — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS arm64
            os: macos-latest
            target: aarch64-apple-ios
          - name: Android arm64
            os: ubuntu-latest
            target: aarch64-linux-android
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Set up Android NDK
        if: startsWith(matrix.target, 'aarch64-linux-android')
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
      - name: Configure Android linker
        if: startsWith(matrix.target, 'aarch64-linux-android')
        run: |
          TC="${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          {
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TC/aarch64-linux-android24-clang"
            echo "CC_aarch64_linux_android=$TC/aarch64-linux-android24-clang"
            echo "AR_aarch64_linux_android=$TC/llvm-ar"
          } >> "$GITHUB_ENV"
      - name: Build client core for ${{ matrix.target }}
        run: cargo build -p weft-vpn -p weft-net --target ${{ matrix.target }}

  typescript:
    name: TypeScript (SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm build

  security:
    name: Dependency audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cargo-deny checks advisories (RUSTSEC), license policy, banned crates, and
      # source registries against `deny.toml` (M8 audit hardening).
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
