name: release-desktop

# Legacy desktop prototype. The supported public path is script-based node operation plus standard
# VLESS clients, so this workflow is manual-only and should not be used for public releases until
# the app is signed/notarized and explicitly brought back into scope.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach builds to (e.g. v0.1.0)'
        required: true
        default: v0.1.0

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            triple: aarch64-apple-darwin
          - platform: macos-13
            triple: x86_64-apple-darwin
          - platform: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
          - platform: windows-latest
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Install JS deps
        run: pnpm install --no-frozen-lockfile

      - name: Build the SDK (generated sources are committed; tsc only)
        run: pnpm --filter @weft/sdk exec tsc -p tsconfig.json

      - name: Fetch the sing-box sidecar for this target
        shell: bash
        run: bash scripts/fetch-singbox.sh ${{ matrix.triple }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: clients/desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: Weft VPN ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: 'Desktop builds. Unsigned — see release notes for the macOS Gatekeeper bypass.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.triple }}
